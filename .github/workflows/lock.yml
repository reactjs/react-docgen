name: 'Lock Threads'

on:
  schedule:
    - cron: '36 4 * * 4'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  discussions: write

concurrency:
  group: lock

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@851cffe46851ddd2051ea7147ebdc995113241c3 # v6
        with:
          log-output: true
