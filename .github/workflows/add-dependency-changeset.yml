name: Add changeset to dependency updates

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - labeled

permissions: {}

jobs:
  add-changeset:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'dependencies') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Add dependency changeset
        uses: mscharley/dependency-changesets-action@874dac2372a085cb94f750e8bdf5b1173a838a75 # v1.2.5
        with:
          token: ${{ secrets.CHANGESETS_TOKEN }}
          use-conventional-commits: true
          commit-message: "chore(deps): add changeset"
          author-name: "danez[bot]"
          author-email: "120286224+danez-bot@users.noreply.github.com"
